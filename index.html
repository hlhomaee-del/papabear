<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Papa Bear’s Little Lantern Cabin</title>
<style>
:root{
  --night:#07172f; --sky:#10284c; --snow:#eaf7ff; --paper:#fff3d3; --ink:#372216;
  --gold:#ffd46b; --amber:#f6a53a; --fire:#ff742e; --wood:#7a4325; --wood2:#9c5b33;
  --blue:#356799; --soft:#fff8e9; --red:#d93345; --ribbonBlue:#2684d9; --green:#3e865d;

}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;font-family:Georgia,'Times New Roman',serif;background:radial-gradient(circle at 50% 0,#264d75 0,#0c2345 45%,#061426 100%);color:var(--ink);overflow-x:hidden}
button,input,textarea{font:inherit}
#snow{position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden}.flake{position:absolute;top:-20px;color:white;opacity:.82;animation:fall linear infinite;text-shadow:0 0 8px #fff}@keyframes fall{to{transform:translateY(110vh) rotate(360deg)}}
.app{position:relative;z-index:2;max-width:1180px;margin:0 auto;padding:18px 14px 42px}.topTitle{text-align:center;color:#fff3cf;text-shadow:0 0 18px rgba(255,212,107,.8);margin:8px 0 12px}.topTitle h1{font-size:clamp(2rem,5vw,4.5rem);margin:0}.topTitle p{font-size:1.1rem;margin:.35rem 0 0;color:#ddecff}
.stageWrap{position:sticky;top:0;z-index:5;padding-top:8px;background:linear-gradient(180deg,rgba(7,23,47,.96),rgba(7,23,47,.72) 76%,transparent);border-radius:0 0 28px 28px}.stage{position:relative;width:100%;height:clamp(330px,47vw,540px);border:8px solid rgba(255,228,166,.65);border-radius:34px;box-shadow:var(--shadow), inset 0 0 45px rgba(255,207,118,.2);overflow:hidden;background:linear-gradient(#0d2d56 0 22%,#123b62 22% 36%,#5d351f 36% 100%)}
.sky{position:absolute;inset:0 0 56%;background:radial-gradient(circle at 12% 20%,rgba(255,255,255,.65) 0 2px,transparent 3px),radial-gradient(circle at 78% 18%,rgba(255,255,255,.6) 0 2px,transparent 3px),linear-gradient(#082144,#123b67);transition:.6s}.moon{position:absolute;right:12%;top:8%;width:56px;height:56px;border-radius:50%;background:#fff4c7;box-shadow:0 0 35px #fff0a8}.pines{position:absolute;left:0;right:0;top:22%;height:22%;background:repeating-linear-gradient(115deg,transparent 0 26px,rgba(25,70,61,.8) 27px 48px);opacity:.75}
.cabin{position:absolute;inset:28% 4% 4%;border-radius:26px;background:repeating-linear-gradient(90deg,var(--wood) 0 34px,var(--wood2) 35px 40px,#6b391f 41px 70px);box-shadow:inset 0 0 0 5px rgba(77,35,14,.45),inset 0 0 75px rgba(38,14,0,.48)}
.cabin:before{content:"";position:absolute;left:0;right:0;top:0;height:12px;background:repeating-linear-gradient(90deg,#b97942 0 50px,#5a2f1a 51px 58px)}.floor{position:absolute;left:0;right:0;bottom:0;height:24%;background:repeating-linear-gradient(0deg,#70401f 0 20px,#8c552f 21px 24px)}
.window{position:absolute;right:5%;top:12%;width:18%;height:29%;border:7px solid #5b321d;border-radius:14px;background:linear-gradient(#102b5a,#1b4f77);box-shadow:0 0 22px rgba(255,219,116,.45);cursor:pointer;transition:.45s}.window.open{transform:rotateY(18deg);box-shadow:0 0 18px #bfe7ff}.window:before,.window:after{content:"";position:absolute;background:#5b321d}.window:before{left:48%;top:0;width:6px;height:100%}.window:after{top:48%;left:0;width:100%;height:6px}.curtain{position:absolute;inset:0;background:linear-gradient(90deg,rgba(188,43,62,.45),transparent 40%,transparent 60%,rgba(188,43,62,.45));border-radius:8px;pointer-events:none}.windowNote{position:absolute;right:3%;top:43%;color:#fff8dc;font-size:.8rem;text-shadow:0 1px 6px #000;opacity:.85}
.fireplace{position:absolute;left:5%;bottom:22%;width:19%;height:30%;border-radius:18px 18px 8px 8px;background:linear-gradient(#714126,#3d2216);box-shadow:inset 0 0 0 7px #3b2115,0 0 18px rgba(255,122,46,.55);cursor:pointer}.fire{position:absolute;left:29%;bottom:14%;width:42%;height:48%;border-radius:50% 50% 42% 42%;background:radial-gradient(circle at 50% 75%,#fff09b 0 12%,#ffbb43 13% 35%,#ff6426 36% 70%,transparent 72%);filter:blur(.3px);animation:flicker .75s infinite alternate;transform-origin:bottom}.logs{position:absolute;left:23%;bottom:12%;width:55%;height:9%;border-radius:20px;background:#44210d;transform:rotate(-6deg);box-shadow:18px 5px #5b2e12}@keyframes flicker{from{transform:scale(.96) skewX(-3deg);filter:brightness(.95)}to{transform:scale(1.08) skewX(3deg);filter:brightness(1.28)}}
.table{position:absolute;left:28%;bottom:23%;width:34%;height:18%;border-radius:18px;background:linear-gradient(#a86a3f,#7b4323);box-shadow:0 12px 0 #4b2817,0 24px 22px rgba(0,0,0,.28);z-index:3}.table:before{content:"";position:absolute;left:5%;right:5%;top:24%;height:2px;background:rgba(255,229,170,.35)}.bowl{position:absolute;left:39%;bottom:59%;width:22%;height:34%;border-radius:50% 50% 45% 45%;background:linear-gradient(#fff0c9,#d38c54);box-shadow:inset 0 -7px #9b5126;cursor:pointer}.soup{position:absolute;left:18%;right:18%;top:20%;height:38%;border-radius:50%;background:radial-gradient(circle,#ffdf84,#ea8734)}.steam{position:absolute;left:43%;bottom:90%;font-size:2.1rem;color:#fff7d5;opacity:.7;animation:steam 2.5s infinite ease-in-out}.steam.hot{font-size:3.2rem;opacity:1;color:#fffbe4}@keyframes steam{50%{transform:translateY(-20px) scale(1.15);opacity:.2}}
.cups{position:absolute;left:28%;bottom:65%;display:flex;gap:42%;width:44%;justify-content:space-between}.cup{width:28px;height:34px;border-radius:4px 4px 11px 11px;background:#3fa16f;box-shadow:inset 0 -5px rgba(0,0,0,.18);cursor:pointer}.cup.blue{background:#5bb8ff}.cup:after{content:"";position:absolute;width:10px;height:14px;border:3px solid rgba(255,255,255,.75);border-left:0;border-radius:0 12px 12px 0;margin-left:24px;margin-top:8px}
.lanterns{position:absolute;left:41%;top:8%;display:flex;gap:52px;z-index:6}.lantern{width:36px;height:58px;border-radius:12px;background:linear-gradient(#653919,#29150a);border:3px solid #271307;box-shadow:var(--glow);cursor:pointer;animation:lanternF 1.8s infinite alternate}.lantern:before{content:"";position:absolute;left:8px;top:12px;width:14px;height:26px;border-radius:8px;background:radial-gradient(#fff7b2,#ffc447 50%,#d66b1e);box-shadow:0 0 25px #ffd66a}.lantern:after{content:"";position:absolute;left:8px;top:-14px;width:14px;height:14px;border:3px solid #241207;border-bottom:0;border-radius:12px 12px 0 0}@keyframes lanternF{from{filter:brightness(.9)}to{filter:brightness(1.32)}}
.paperStars{position:absolute;left:34%;top:5%;right:25%;height:90px;display:none;z-index:7}.star{position:absolute;color:#ffe08b;text-shadow:0 0 12px #ffe08b;font-size:28px;animation:twinkle 1.7s infinite alternate;cursor:pointer}.star:nth-child(2){left:35%;top:28px;color:#e6f5ff;animation-delay:.3s}.star:nth-child(3){left:72%;top:8px;color:#ffdc73;animation-delay:.65s}@keyframes twinkle{to{transform:scale(1.25) rotate(8deg);filter:brightness(1.5)}}
.bedroom{position:absolute;inset:18% 3% 5%;display:none;z-index:8;border-radius:24px;background:linear-gradient(180deg,rgba(47,24,15,.2),rgba(68,35,23,.55));box-shadow:inset 0 0 60px rgba(255,198,91,.28)}.beds{position:absolute;left:28%;right:7%;bottom:13%;height:32%;display:flex;gap:3%;align-items:flex-end}.bed{flex:1;height:72%;background:linear-gradient(#9b5630,#6e371e);border-radius:20px 20px 9px 9px;box-shadow:0 12px 0 #412010;position:relative}.blanket{position:absolute;left:5%;right:5%;bottom:8%;height:53%;border-radius:18px;background:linear-gradient(135deg,#ffcadc,#fd8cb4)}.bed:nth-child(2) .blanket{background:linear-gradient(135deg,#b9e3ff,#61b5f0)}.pillow{position:absolute;left:10%;top:8%;width:48%;height:28%;border-radius:18px;background:#fff2df}.storyBook{position:absolute;left:11%;bottom:19%;width:15%;height:16%;border-radius:6px;background:linear-gradient(90deg,#c23144 49%,#f1cf87 50%);box-shadow:0 0 16px rgba(255,230,160,.55);cursor:pointer;transform:rotate(-4deg)}
.character{position:absolute;z-index:10;cursor:pointer;transition:.35s;filter:drop-shadow(0 10px 12px rgba(0,0,0,.28));animation:breathe 3s ease-in-out infinite}.papa{left:12%;bottom:23%;width:152px;height:190px}.cub{width:100px;height:130px;bottom:33%}.clover{left:63%;}.pip{left:72%;}.bearBody{position:absolute;left:17%;bottom:0;width:66%;height:70%;background:#8f5b36;border-radius:47% 47% 35% 35%;box-shadow:inset -10px -10px 0 rgba(0,0,0,.13)}.bearHead{position:absolute;left:10%;top:0;width:80%;height:64%;background:#9c6840;border-radius:50%;box-shadow:inset -9px -8px 0 rgba(0,0,0,.12)}.ear{position:absolute;top:-5%;width:30%;height:30%;border-radius:50%;background:#8a542f}.ear.l{left:3%}.ear.r{right:3%}.ear:after{content:"";position:absolute;inset:22%;border-radius:50%;background:#d59a67}.eye{position:absolute;top:42%;width:9px;height:9px;border-radius:50%;background:#16100b}.eye.l{left:35%}.eye.r{right:35%}.snout{position:absolute;left:36%;top:50%;width:28%;height:22%;border-radius:50%;background:#dca572}.nose{position:absolute;left:43%;top:53%;width:14%;height:10%;border-radius:50%;background:#26150d}.smile{position:absolute;left:41%;top:64%;width:18%;height:9%;border-bottom:2px solid #2a160c;border-radius:0 0 20px 20px}.arm{position:absolute;top:42%;width:22%;height:48%;background:#81502f;border-radius:30px}.arm.l{left:2%;transform:rotate(18deg)}.arm.r{right:2%;transform:rotate(-18deg)}.scarf{position:absolute;left:22%;top:58%;width:56%;height:12%;border-radius:12px;background:#8ac2d9}.ribbon{position:absolute;top:18%;right:5%;width:36px;height:22px;z-index:4}.ribbon:before,.ribbon:after{content:"";position:absolute;width:20px;height:20px;border-radius:50% 50% 50% 0;background:var(--red);transform:rotate(45deg);box-shadow:inset 0 0 0 3px rgba(255,255,255,.25)}.ribbon:after{left:15px;transform:rotate(135deg)}.ribbon i{position:absolute;left:15px;top:6px;width:8px;height:8px;border-radius:50%;background:#fff;z-index:2;box-shadow:-8px -3px #fff,10px -1px #fff,0 9px #fff}.pip .ribbon:before,.pip .ribbon:after{background:var(--ribbonBlue)}
@keyframes breathe{50%{transform:translateY(-5px) scale(1.01)}}.thought{position:absolute;z-index:20;max-width:280px;padding:14px 16px;border-radius:20px;background:#fff9e7;border:3px solid #ffd774;box-shadow:0 10px 28px rgba(0,0,0,.28);font-weight:bold;display:none}.thought.show{display:block;animation:pop .35s ease}.thought:after{content:"";position:absolute;bottom:-15px;left:35px;border:15px solid transparent;border-top-color:#fff9e7}@keyframes pop{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
.stage.dark .sky{filter:brightness(.5)}.stage.dark .cabin{filter:brightness(.76)}.stage.dark .fireplace,.stage.dark .lantern{filter:brightness(1.25)}.stage.extraWarm{box-shadow:var(--shadow),0 0 70px rgba(255,202,91,.75),inset 0 0 55px rgba(255,207,118,.25)}.stage.cold{filter:saturate(.8) brightness(.88)}.stage.starMode .paperStars{display:block}.stage.bedMode .bedroom{display:block}.stage.bedMode .table,.stage.bedMode .cups{opacity:.2}.stage.forestMode .cabin{opacity:.25}.stage.forestMode:after{content:"🦆  🦆  🦆";position:absolute;right:8%;bottom:20%;font-size:42px;animation:waddle 2s infinite alternate}.stage.forestMode:before{content:"";position:absolute;left:22%;right:5%;bottom:12%;height:22%;border-radius:50%;background:linear-gradient(#bde8ff,#69aee7);box-shadow:inset 0 0 30px rgba(255,255,255,.8)}@keyframes waddle{to{transform:translateX(-22px)}}
.controlBar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:10px auto 0;padding:10px;border-radius:24px;background:rgba(255,246,221,.18);backdrop-filter:blur(6px)}.kidBtn,.choiceBtn,.navBtn{border:0;border-radius:999px;padding:12px 18px;font-weight:800;cursor:pointer;box-shadow:0 6px 0 rgba(75,35,14,.65),0 12px 20px rgba(0,0,0,.18);transition:.18s;background:linear-gradient(#fff7ad,#ffc84d);color:#49220c}.kidBtn:nth-child(2n){background:linear-gradient(#ffdaef,#ff8fc4)}.kidBtn:nth-child(3n){background:linear-gradient(#c9f3ff,#5bb8ff)}.kidBtn:nth-child(4n){background:linear-gradient(#d7ffca,#75d676)}button:hover{transform:translateY(-3px) scale(1.03)}button:active{transform:translateY(3px);box-shadow:0 3px 0 rgba(75,35,14,.65)}
.audioDock{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin:10px 0}.audioDock button{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.4);color:#fff7da;border-radius:999px;padding:8px 12px;cursor:pointer}.tracker{display:flex;justify-content:center;gap:8px;margin:10px 0}.dot{width:23px;height:23px;border-radius:50%;background:#39200d;border:2px solid #ffdc73;box-shadow:0 0 10px rgba(255,220,115,.55)}.dot.on{background:#ffd86a;box-shadow:0 0 22px #ffd86a}
.storyPanel{margin:18px auto 0;max-width:930px;background:linear-gradient(180deg,#fff7df,#ffe9b5);border:6px solid rgba(111,60,23,.6);border-radius:30px;padding:clamp(18px,3vw,34px);box-shadow:var(--shadow);font-size:clamp(1.08rem,2.1vw,1.42rem);line-height:1.68;min-height:280px}.sceneTag{display:inline-block;background:#7b3f1f;color:#fff3d3;border-radius:999px;padding:7px 14px;font-weight:800;letter-spacing:.03em}.storyPanel h2{font-size:clamp(1.7rem,3vw,2.45rem);margin:.5rem 0;color:#6b2d17;text-shadow:0 1px #fff}.storyText p{margin:.75rem 0}.choices{display:grid;gap:13px;margin-top:18px}.choiceBtn{text-align:left;background:linear-gradient(#ffffff,#ffdd82);border:3px solid #af6b2e;border-radius:22px;color:#3a1e0e;font-size:1.05em}.choiceBtn::before{content:"✨ ";}.memoryGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-top:18px}.memory{padding:16px;border-radius:22px;background:linear-gradient(135deg,#fff,#ffd98d);border:3px dashed #aa632a;text-align:center;font-weight:900;cursor:pointer}.memory:nth-child(2n){background:linear-gradient(135deg,#fff,#bfeaff)}.memory:nth-child(3n){background:linear-gradient(135deg,#fff,#ffc8e5)}.revealBox{margin-top:16px;padding:16px;border-radius:22px;background:#fffdf3;border-left:8px solid #e38a25;box-shadow:inset 0 0 18px rgba(255,197,87,.28);display:none}.revealBox.show{display:block;animation:pop .25s ease}.navRow{display:flex;flex-wrap:wrap;gap:12px;margin-top:20px;justify-content:center}.navBtn{background:linear-gradient(#e9fffc,#77dce3);border-radius:18px}.doorGrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin:20px 0}.door{min-height:155px;border:5px solid #633015;border-radius:22px 22px 8px 8px;background:linear-gradient(90deg,#7a361d,#b96a31,#713017);color:#fff5d9;text-shadow:0 2px 5px #000;display:grid;place-items:center;text-align:center;font-weight:900;font-size:1.35rem;box-shadow:0 0 24px rgba(255,205,91,.35),inset 0 0 18px rgba(255,232,148,.2);cursor:pointer}.door:hover{box-shadow:0 0 42px #ffd775,inset 0 0 28px rgba(255,232,148,.35)}
.messageArea{display:grid;gap:10px;margin-top:16px}.messageArea textarea{width:100%;min-height:88px;border:3px solid #b46b2c;border-radius:18px;padding:14px;background:#fffaf0;color:#382012}.floatingLantern{margin:18px auto 0;max-width:520px;padding:24px;border-radius:35px;background:radial-gradient(circle,#fff7b7,#ffc94f 55%,#a95817);box-shadow:0 0 55px #ffd46b;text-align:center;font-weight:800;display:none;animation:float 2.4s ease-in-out infinite}.floatingLantern.show{display:block}@keyframes float{50%{transform:translateY(-13px)}}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:30;background:#fff8dc;border:4px solid #ffc94f;color:#42220d;padding:12px 18px;border-radius:999px;font-weight:900;box-shadow:0 12px 30px rgba(0,0,0,.3);display:none}.toast.show{display:block;animation:pop .2s ease}.hidden{display:none!important}
@media(max-width:720px){.stageWrap{position:relative}.stage{height:400px}.papa{width:120px;height:150px;left:5%}.cub{width:78px;height:105px}.clover{left:58%}.pip{left:75%}.table{left:30%;width:34%;bottom:22%}.lanterns{left:35%}.storyPanel{font-size:1rem}.controlBar{gap:7px}.kidBtn{padding:10px 12px;font-size:.92rem}.window{width:24%;right:3%}.fireplace{width:22%}}
</style>
</head>
<body>
<div id="snow"></div>
<div class="app">
  <div class="topTitle"><h1>🕯️ Papa Bear’s Little Lantern Cabin 🐻</h1><p>A living winter storybook about the love hidden in small things.</p></div>
  <div class="stageWrap">
    <div id="stage" class="stage">
      <div class="sky"><div class="moon"></div><div class="pines"></div></div>
      <div class="cabin">
        <div class="floor"></div>
        <div class="window" id="windowObj" title="Open or close the window"><div class="curtain"></div></div><div class="windowNote" id="windowNote">window closed</div>
        <div class="fireplace" id="fireObj"><div class="fire" id="fireFlame"></div><div class="logs"></div></div>
        <div class="lanterns"><div class="lantern" id="lantern1"></div><div class="lantern" id="lantern2"></div></div>
        <div class="paperStars"><span class="star" style="left:5%">★</span><span class="star">★</span><span class="star">✦</span></div>
        <div class="table"><div class="bowl" id="soupObj"><div class="soup"></div><div id="steam" class="steam">♨</div></div></div>
        <div class="cups"><div class="cup blue" id="blueCup"></div><div class="cup" id="greenCup"></div></div>
        <div class="bedroom" id="bedroom">
          <div class="beds"><div class="bed"><div class="pillow"></div><div class="blanket"></div></div><div class="bed"><div class="pillow"></div><div class="blanket"></div></div></div>
          <div class="storyBook" id="bookObj"></div>
        </div>
      </div>
      <div class="character papa" id="papaBear" title="Click Papa Bear">
        <div class="bearBody"></div><div class="bearHead"><div class="ear l"></div><div class="ear r"></div><div class="eye l"></div><div class="eye r"></div><div class="snout"></div><div class="nose"></div><div class="smile"></div></div><div class="arm l"></div><div class="arm r"></div><div class="scarf"></div>
      </div>
      <div class="character cub clover" id="cloverBear" title="Click Clover"><div class="bearBody"></div><div class="bearHead"><div class="ear l"></div><div class="ear r"></div><div class="eye l"></div><div class="eye r"></div><div class="snout"></div><div class="nose"></div><div class="smile"></div><div class="ribbon"><i></i></div></div><div class="arm l"></div><div class="arm r"></div></div>
      <div class="character cub pip" id="pipBear" title="Click Pip"><div class="bearBody"></div><div class="bearHead"><div class="ear l"></div><div class="ear r"></div><div class="eye l"></div><div class="eye r"></div><div class="snout"></div><div class="nose"></div><div class="smile"></div><div class="ribbon"><i></i></div></div><div class="arm l"></div><div class="arm r"></div></div>
      <div id="thought" class="thought"></div>
    </div>
    <div class="controlBar">
      <button class="kidBtn" onclick="toggleLights()">🌙 Turn Lights</button>
      <button class="kidBtn" onclick="lightLanterns()">🕯️ Light Lanterns</button>
      <button class="kidBtn" onclick="heatSoup()">🍲 Heat Soup</button>
      <button class="kidBtn" onclick="stokeFire()">🔥 Warm Fire</button>
      <button class="kidBtn" onclick="toggleWindow()">❄️ Open/Close Window</button>
      <button class="kidBtn" onclick="tuckIn()">🧸 Tuck Them In</button>
      <button class="kidBtn" onclick="sayLove()">💛 Say “I Love You”</button>
    </div>
    <div class="audioDock"><button onclick="audioNote('Read to Me')">🔊 Read to Me</button><button onclick="audioNote('Soft Music')">🎵 Soft Music</button><button onclick="audioNote('Lantern Sound')">🕯️ Lantern Sound</button><button onclick="audioNote('Fireplace Sound')">🔥 Fireplace Sound</button></div>
    <div class="tracker" id="tracker"></div>
  </div>
  <main class="storyPanel" id="storyPanel"></main>
</div>
<div id="toast" class="toast"></div>
<script>
const stage=document.getElementById('stage'), panel=document.getElementById('storyPanel'), thought=document.getElementById('thought'), toast=document.getElementById('toast');
let warmth=2, current='start', openedDoors=[];
function snow(){const s=document.getElementById('snow'); for(let i=0;i<70;i++){let f=document.createElement('span'); f.className='flake'; f.textContent=Math.random()>.75?'✦':'❄'; f.style.left=Math.random()*100+'%'; f.style.fontSize=(8+Math.random()*17)+'px'; f.style.animationDuration=(7+Math.random()*11)+'s'; f.style.animationDelay=(-Math.random()*12)+'s'; s.appendChild(f)}} snow();
function updateTracker(){const t=document.getElementById('tracker');t.innerHTML='';for(let i=1;i<=6;i++){let d=document.createElement('div');d.className='dot'+(i<=warmth?' on':'');t.appendChild(d)}}
function setWarm(n){warmth=Math.max(1,Math.min(6,warmth+n));stage.classList.toggle('extraWarm',warmth>=5);stage.classList.toggle('cold',warmth<=1);updateTracker()}
function showToast(msg){toast.textContent=msg;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),2200)}
function clearModes(){stage.classList.remove('starMode','bedMode','forestMode')}
function sceneMode(mode){clearModes(); if(mode)stage.classList.add(mode)}
function render(id){current=id; const sc=scenes[id]; if(!sc)return; sceneMode(sc.mode); if(sc.warm) setWarm(sc.warm); panel.innerHTML=`<span class="sceneTag">${sc.tag||'Story'}</span><h2>${sc.title}</h2><div class="storyText">${sc.text}</div>${renderMem(sc.memories)}${renderDoors(sc.doors)}${renderChoices(sc.choices)}${renderNav(sc.nav)}${sc.message?messageBox():''}`; window.scrollTo({top:0,behavior:'smooth'});}
function renderChoices(c){if(!c)return '';return `<div class="choices">${c.map(x=>`<button class="choiceBtn" onclick="choose('${x.to}',${x.warm||0})">${x.label}</button>`).join('')}</div>`}
function choose(to,w){if(w)setWarm(w);render(to)}
function renderNav(nav){if(!nav)return '';return `<div class="navRow">${nav.map(x=>`<button class="navBtn" onclick="render('${x.to}')">${x.label}</button>`).join('')}</div>`}
function renderDoors(d){if(!d)return '';return `<div class="doorGrid">${d.map(x=>`<div class="door" onclick="openDoor('${x.to}')">${x.label}</div>`).join('')}</div>`}
function openDoor(to){openedDoors.push(to);setWarm(1);render(to)}
function renderMem(m){if(!m)return '';return `<div class="memoryGrid">${m.map((x,i)=>`<div class="memory" onclick="revealMemory(${i})">${x.icon||'✨'}<br>${x.label}</div>`).join('')}</div><div id="revealBox" class="revealBox"></div>`}
function revealMemory(i){const m=scenes[current].memories[i];document.getElementById('revealBox').innerHTML=m.text;document.getElementById('revealBox').classList.add('show');if(m.warm)setWarm(m.warm)}
function messageBox(){return `<div class="messageArea"><h3>Leave a Lantern Message</h3><textarea id="m1" placeholder="Papa Bear, I noticed that you…"></textarea><textarea id="m2" placeholder="One kind thing I could say next time is…"></textarea><textarea id="m3" placeholder="One thing we could do together is…"></textarea><button class="kidBtn" onclick="lightMessage()">🕯️ Light My Lantern</button><div id="finalLantern" class="floatingLantern"></div></div>`}
function lightMessage(){const text=[m1.value,m2.value,m3.value].filter(Boolean).join('<br><br>');const l=document.getElementById('finalLantern');l.innerHTML=text||'A quiet little lantern can still shine.';l.classList.add('show');setWarm(2);showToast('Your lantern message is glowing in the window.');}
function pos(el){const r=el.getBoundingClientRect(), sr=stage.getBoundingClientRect(); return {x:r.left-sr.left+r.width*.48,y:r.top-sr.top-8}}
function bubble(el,msg){const p=pos(el);thought.innerHTML=msg;thought.style.left=Math.min(p.x,stage.clientWidth-300)+'px';thought.style.top=Math.max(15,p.y-90)+'px';thought.classList.add('show');setTimeout(()=>thought.classList.remove('show'),4400)}
document.getElementById('papaBear').onclick=e=>bubble(e.currentTarget, current.includes('bed')?'Papa Bear thinks: “I will read slowly, so the room feels safe.”':'Papa Bear thinks: “I hope the little things tell them what my voice cannot.”');
document.getElementById('cloverBear').onclick=e=>bubble(e.currentTarget,'Clover thinks: “I notice more when the room gets quiet.”');
document.getElementById('pipBear').onclick=e=>bubble(e.currentTarget, current.includes('bed')?'Pip whispers: “Can Papa read one more page?”':'Pip thinks: “Maybe little can still feel warm.”');
['lantern1','lantern2'].forEach(id=>document.getElementById(id).onclick=()=>lightLanterns());
document.getElementById('fireObj').onclick=()=>stokeFire(); document.getElementById('soupObj').onclick=()=>heatSoup(); document.getElementById('windowObj').onclick=()=>toggleWindow(); document.getElementById('bookObj').onclick=()=>showToast('Papa Bear opens the storybook and reads in a soft, slow voice.');
function toggleLights(){stage.classList.toggle('dark');showToast(stage.classList.contains('dark')?'The room grows soft and sleepy.':'The warm room brightens again.');}
function lightLanterns(){setWarm(1);showToast('The two lanterns glow brighter — one for Clover, one for Pip.');}
function heatSoup(){document.getElementById('steam').classList.add('hot');setWarm(1);showToast('The soup warms up. The steam curls like tiny hearts.');setTimeout(()=>document.getElementById('steam').classList.remove('hot'),3500)}
function stokeFire(){stage.classList.add('extraWarm');setWarm(1);showToast('The fireplace glows stronger and the cabin feels warmer.');}
function toggleWindow(){const w=document.getElementById('windowObj');w.classList.toggle('open');document.getElementById('windowNote').textContent=w.classList.contains('open')?'window open — snow air':'window closed';showToast(w.classList.contains('open')?'A little snow air slips in.':'The window closes and the room feels cozy.');}
function tuckIn(){sceneMode('bedMode');setWarm(1);showToast('The blankets slide up softly. Clover and Pip are tucked in.');}
function sayLove(){setWarm(1);showToast('Papa Bear says, “I love you, little cubs.” The lanterns answer with light.');}
function audioNote(name){showToast(name+' button is ready for future audio.');}
const scenes={
start:{tag:'Start',title:'Papa Bear’s Little Lantern Cabin',text:`<p>Once, beyond the snowy pines and the blue hills of Lantern Hollow, there lived a gentle bear called Papa Bear.</p><p>His cabin was not large. It did not have long hallways or shining staircases. But every time his cubs were coming, Papa Bear made the little cabin ready.</p><p>He swept the floor. He warmed the soup. He folded the blankets. He placed two cups on the table. And in the window, he lit two lanterns: one for Clover, one for Pip.</p><p><b>Use the buttons above anytime:</b> turn the lights, warm the soup, open the window, light the lanterns, or tuck the cubs in.</p>`,nav:[{label:'Begin the Story',to:'door'}]},
door:{tag:'Scene 1',title:'The Little Cabin Door',text:`<p>When Clover and Pip came to the little cabin, Papa Bear opened the door before they even knocked.</p><p>“I heard your paws in the snow,” he said with a smile.</p><p>The cabin smelled like soup, pinewood, and warm bread. Pip looked around. The table was small. The rug was small. The sleeping corner was small.</p><p>“This cabin is little,” Pip said.</p><p>Papa Bear’s smile stayed soft. “Yes, little cub,” he said. “But I warmed every corner I could find.”</p><p><b>What should Pip say next?</b></p>`,choices:[{label:'“I don’t like it here.”',to:'sharp',warm:-1},{label:'“I miss having more room.”',to:'honest',warm:0},{label:'“Can we make this corner cozy?”',to:'cozy',warm:1}]},
sharp:{tag:'Choice',title:'A Sharp Little Sentence',text:`<p>Pip says, “I don’t like it here.”</p><p>The fire crackles softly. Papa Bear looks at the soup pot for one quiet second.</p><p>Then he says, “You must be hungry from the walk.” He places her favorite cup on the table.</p><p>Sharp words can make a warm room feel colder. But Papa Bear still kept the soup warm.</p>`,nav:[{label:'Continue',to:'before'}]},
honest:{tag:'Choice',title:'An Honest Feeling',text:`<p>Pip says, “I miss having more room.”</p><p>Papa Bear nods. “That is an honest feeling,” he says. “We can hold honest feelings gently.”</p><p>He moves a cushion closer to the fire. Honest words are easier to hold than sharp ones.</p>`,nav:[{label:'Continue',to:'before'}]},
cozy:{tag:'Choice',title:'The Cozy Corner',text:`<p>Pip says, “Can we make this corner cozy?”</p><p>Papa Bear’s eyes brighten. “I was hoping you might ask.”</p><p>He brings out a folded blanket with tiny stitched stars. Sometimes one kind question makes a little room begin to grow.</p>`,mode:'starMode',nav:[{label:'Continue',to:'before'}]},
before:{tag:'Scene 2',title:'Papa Bear Alone Before They Came',text:`<p>Before Clover and Pip came through the snow, Papa Bear had been busy all morning.</p><p>He tasted the soup. “Too much pepper for Pip,” he murmured. He added more noodles. “Clover likes noodles when the day is cold.”</p><p>He checked the boots by the fire. He shook out the blankets. He looked at the two little cups. Then he looked at the door.</p><p>The cabin was very quiet. So Papa Bear lit the two lanterns in the window. Not because anyone was lost. But because someone was welcome.</p><p><b>Click the objects below to discover what Papa Bear remembered.</b></p>`,memories:[{icon:'🍲',label:'Soup Pot',text:'Papa Bear remembered that Pip liked her carrots cut small. He cut them into tiny orange moons.',warm:1},{icon:'🥾',label:'Boots',text:'Papa Bear remembered Clover’s paws got cold last time, so he warmed the boots before she arrived.',warm:1},{icon:'🧺',label:'Blankets',text:'Papa Bear chose the softest blanket because Pip once said the wool scratched her chin.',warm:1},{icon:'☕',label:'Two Cups',text:'Papa Bear kept the blue cup and green cup safe on the highest shelf, waiting for the cubs.',warm:1},{icon:'🕯️',label:'Lanterns',text:'Papa Bear lit one lantern for each cub before they arrived. Some kinds of love happen before anyone is there to see them.',warm:1}],nav:[{label:'Open the Lantern Doors',to:'doors'}]},
doors:{tag:'Lantern Doors',title:'Choose Tonight’s Door',text:`<p>Tonight, you may choose two lantern doors. Tomorrow, you can return and open another.</p><p>Each door shows a different little piece of Papa Bear’s love.</p>`,doors:[{label:'🍲 The Soup Door',to:'soup1'},{label:'🌲 The Forest Door',to:'forest1'},{label:'⭐ The Star Door',to:'star1'},{label:'🌙 Bedtime Door',to:'bed1'}]},
soup1:{tag:'Soup Door',title:'The Soup That Remembered',text:`<p>Papa Bear carried the soup carefully. Pip looked into her bowl. The carrots were cut into tiny moons. The noodles curled like little ribbons.</p><p>Clover looked into her bowl. Extra noodles. Just the way she liked them.</p><p>“How did you know?” Pip asked.</p><p>Papa Bear chuckled. “You told me once.”</p><p>Pip had forgotten saying it. Papa Bear had not.</p><p><b>What should Pip do?</b></p>`,choices:[{label:'Eat without saying anything.',to:'soupQuiet',warm:0},{label:'Say, “You remembered?”',to:'soupRemembered',warm:1},{label:'Say, “Can I help stir next time?”',to:'soupHelp',warm:2}]},
soupQuiet:{tag:'Soup Door',title:'Quiet Noticing',text:`<p>Pip eats quietly. Papa Bear does not ask for praise.</p><p>But Clover notices his shoulders relax when Pip takes another spoonful.</p><p>Even quiet noticing can begin inside the heart.</p>`,nav:[{label:'Continue',to:'cupShelf'}]},
soupRemembered:{tag:'Soup Door',title:'You Remembered?',text:`<p>Pip whispers, “You remembered?”</p><p>Papa Bear smiles. “I try to keep important things in my heart.”</p><p>The lantern on the table glows brighter. A remembered thing can feel like a hug.</p>`,nav:[{label:'Continue',to:'cupShelf'}]},
soupHelp:{tag:'Soup Door',title:'Next Time Begins Now',text:`<p>Pip says, “Can I help stir next time?”</p><p>Papa Bear’s big paws pause. Then he hands her the wooden spoon.</p><p>“Next time can begin now,” he says.</p><p>The soup steam curls upward like a tiny heart.</p>`,nav:[{label:'Continue',to:'cupShelf'}]},
cupShelf:{tag:'Soup Door',title:'The Cup on the Shelf',text:`<p>After supper, Clover noticed two little cups high on the shelf. One blue. One green.</p><p>“Papa, why do you keep those cups up there?”</p><p>Papa Bear looked almost shy. “So they will be safe for when you come.”</p><p>“You keep them even when we are not here?” Pip asked.</p><p>Papa Bear nodded. “The cabin remembers you with me.”</p>`,memories:[{icon:'💙',label:'Blue Cup',text:'Papa Bear kept it safe after Clover once said it felt like holding a piece of sky.',warm:1},{icon:'💚',label:'Green Cup',text:'Papa Bear washed it twice because he wanted it to shine for Pip.',warm:1}],nav:[{label:'Back to Lantern Doors',to:'doors'},{label:'Go to Final Doors',to:'finalDoors'}]},
forest1:{tag:'Forest Door',title:'The Trail Papa Planned',mode:'forestMode',text:`<p>The next morning, Pip pressed her nose to the window. “It is boring here,” she said.</p><p>Papa Bear tied his scarf. “Then we must go where the trees keep secrets.”</p><p>Outside, the snow glittered. Clover noticed Papa Bear’s backpack. Inside were apples, warm mittens, a tiny map, and two honey cakes wrapped in cloth.</p><p>“Did you pack all that today?” Clover asked.</p><p>“Last night,” Papa Bear smiled.</p>`,memories:[{icon:'🎒',label:'Backpack',text:'Papa Bear packed extra mittens because Pip always loses one.',warm:1},{icon:'🗺️',label:'Map',text:'Papa Bear drew the path himself, curving it toward the pond with ducks.',warm:1},{icon:'🍯',label:'Honey Cakes',text:'Papa Bear saved the last honey to make them.',warm:1},{icon:'🍎',label:'Apples',text:'Papa Bear cut them small because he remembered a tender little tooth.',warm:1}],nav:[{label:'Walk to the Pond',to:'pond'}]},
pond:{tag:'Forest Door',title:'The Pond of Ducks',mode:'forestMode',text:`<p>At the end of the path, the forest opened to a frozen pond. Near the reeds, ducks waddled in a sleepy line.</p><p>“Ducks!” Pip gasped.</p><p>Papa Bear laughed. “You told me you liked them.”</p><p>“When?”</p><p>“In spring,” said Papa Bear. “You saw one with a green head and said it looked like a king.”</p><p>Pip had forgotten. Papa Bear had not.</p><p><b>What should Pip do now?</b></p>`,choices:[{label:'Run ahead without looking back.',to:'pondRun',warm:0},{label:'Look at Papa Bear and smile.',to:'pondSmile',warm:1},{label:'Ask Papa Bear to tell the duck story again.',to:'pondStory',warm:2}]},
pondRun:{tag:'Forest Door',title:'Still Watching',mode:'forestMode',text:`<p>Pip runs ahead. Papa Bear watches carefully to make sure she does not slip.</p><p>Even when Pip forgot to look back, Papa Bear was still watching over her.</p>`,nav:[{label:'Back to Lantern Doors',to:'doors'},{label:'Go to Final Doors',to:'finalDoors'}]},
pondSmile:{tag:'Forest Door',title:'A Smile That Sees',mode:'forestMode',text:`<p>Pip smiles at Papa Bear. The pond shines gold.</p><p>A smile can tell someone, “I see what you did.”</p>`,nav:[{label:'Back to Lantern Doors',to:'doors'},{label:'Go to Final Doors',to:'finalDoors'}]},
pondStory:{tag:'Forest Door',title:'The Duck Story',mode:'forestMode',text:`<p>Papa Bear tells the duck story with a silly duck voice.</p><p>Clover laughs so hard she falls into the snow, and even the ducks seem to waddle more proudly.</p>`,nav:[{label:'Back to Lantern Doors',to:'doors'},{label:'Go to Final Doors',to:'finalDoors'}]},
star1:{tag:'Star Door',title:'The Paper Star Corner',mode:'starMode',text:`<p>That night, when the fire was low, Clover looked up.</p><p>Above the sleeping corner were paper stars. Some were silver. Some were gold. Some were crooked. One looked more like a potato than a star.</p><p>“Papa, did you make those?”</p><p>Papa Bear rubbed the back of his neck. “I tried.”</p><p>Pip squinted. “They are not real stars.”</p><p>“No,” Papa Bear said. “I could not bring the real ones inside. So I made the kind I could reach.”</p>`,memories:[{icon:'⭐',label:'Gold Star',text:'Papa Bear cut this one three times because the first two tore.',warm:1},{icon:'✦',label:'Silver Star',text:'Papa Bear made this one after Clover said she liked the night sky.',warm:1},{icon:'🥔',label:'Crooked Star',text:'Papa Bear almost threw this one away, then thought it looked cheerful.',warm:1}],choices:[{label:'“They are not real.”',to:'starReal',warm:0},{label:'“You remembered I liked stars?”',to:'starRemember',warm:1},{label:'“Can we make more together?”',to:'starTogether',warm:2}]},
starReal:{tag:'Star Door',title:'Real Trying',mode:'starMode',text:`<p>Papa Bear smiles gently. “No, little cub. But they are real paper. And real trying.”</p>`,nav:[{label:'Continue to Night Thought',to:'nightThought'}]},
starRemember:{tag:'Star Door',title:'I Remember More Than You Think',mode:'starMode',text:`<p>The listening lantern glows.</p><p>Papa Bear says, “I remember more than you think.”</p>`,nav:[{label:'Continue to Night Thought',to:'nightThought'}]},
starTogether:{tag:'Star Door',title:'More Stars Together',mode:'starMode',text:`<p>Papa Bear brings out paper, scissors, and string.</p><p>The ceiling slowly fills with more stars, each one a little imperfect, each one shining anyway.</p>`,nav:[{label:'Continue to Night Thought',to:'nightThought'}]},
nightThought:{tag:'Night Thought',title:'When the Cubs Fell Asleep',mode:'bedMode',text:`<p>When the cubs fell asleep, Papa Bear did not sleep right away.</p><p>He tucked the blanket around Clover’s paws. He moved Pip’s cup away from the edge of the table. He placed one more log on the fire.</p><p>Then he sat quietly.</p><p>The cabin was small. But with the cubs inside it, Papa Bear felt as if the whole sky had come home.</p><p>He whispered, so softly only the lantern heard, “I hope they know.”</p><p>The lantern flickered.</p><p>“I hope they know how much.”</p>`,nav:[{label:'Continue',to:'cubsWhisper'}]},
bed1:{tag:'Bedtime Door',title:'Papa Bear Reads a Story',mode:'bedMode',text:`<p>The cabin grew softer. The fire lowered its voice. Papa Bear opened an old red storybook and sat between the two little beds.</p><p>“One story,” he said.</p><p>“Two,” said Pip quickly.</p><p>Clover smiled into her pillow.</p><p>Papa Bear pretended to think very hard. “One long story, then.”</p><p>He read slowly, with his big careful paw on the page, and every word seemed to tuck the room in too.</p><p><b>Try the bedtime buttons above:</b> turn off the lights, tuck them in, or say “I love you.” Then choose what the cubs say.</p>`,choices:[{label:'Pip says, “Read the duck part again.”',to:'bedDuck',warm:1},{label:'Clover whispers, “I like when you read slowly.”',to:'bedSlow',warm:2},{label:'Both cubs say, “Goodnight, Papa Bear.”',to:'bedGoodnight',warm:2}]},
bedDuck:{tag:'Bedtime Door',title:'The Duck Part Again',mode:'bedMode',text:`<p>Papa Bear reads the duck part again, this time with a very serious duck voice.</p><p>Pip giggles into the blanket. Clover tries not to laugh and fails.</p><p>The little room becomes bright with sleepy happiness.</p>`,nav:[{label:'Listen to the Cubs Whisper',to:'cubsWhisper'}]},
bedSlow:{tag:'Bedtime Door',title:'The Slow Reading Voice',mode:'bedMode',text:`<p>Clover whispers, “I like when you read slowly.”</p><p>Papa Bear’s eyes soften. “Then I will read slowly enough for the stars to hear.”</p><p>He turns the page as if it is something precious.</p>`,nav:[{label:'Listen to the Cubs Whisper',to:'cubsWhisper'}]},
bedGoodnight:{tag:'Bedtime Door',title:'Goodnight, Papa Bear',mode:'bedMode',text:`<p>“Goodnight, Papa Bear,” the cubs say.</p><p>Papa Bear touches each little blanket. “Goodnight, Clover. Goodnight, Pip. I love you all the way past the pines.”</p><p>The two lanterns in the window glow as if they heard him.</p>`,nav:[{label:'Listen to the Cubs Whisper',to:'cubsWhisper'}]},
cubsWhisper:{tag:'Interlude',title:'The Cubs Alone',mode:'bedMode',text:`<p>Later, when Papa Bear was washing the bowls, Clover and Pip whispered under the paper stars.</p><p>“I still wish the cabin were bigger,” Pip said.</p><p>“Me too,” Clover nodded.</p><p>Pip pulled the blanket to her chin. “But he remembered the ducks.”</p><p>“And the soup,” said Clover.</p><p>“And the stars.”</p><p>“And the cups.”</p><p>Pip was quiet for a while.</p><p>“Do you think Papa thinks about us when we are not here?”</p><p>Clover looked at the two lanterns in the window. “I think that is why the lanterns are already lit.”</p><p><b>What should Pip whisper back?</b></p>`,choices:[{label:'“Maybe.”',to:'finalDoors',warm:0},{label:'“I did not know he did all that.”',to:'finalDoors',warm:1},{label:'“Tomorrow, maybe we can do something for him.”',to:'finalDoors',warm:2}]},
finalDoors:{tag:'Final Doors',title:'How Will You Answer Quiet Love?',text:`<p>By the end of the night, the cabin had not become bigger. The table was still small. The rug was still small. The sleeping corner was still small.</p><p>But Clover and Pip had begun to see things they had not seen before: the soup that remembered, the boots by the fire, the cups on the shelf, the stars Papa Bear could reach, the ducks he had remembered, and the lanterns he lit before they arrived.</p><p>Then, in the golden light, four little doors appeared.</p><p>A whisper moved through the cabin: <i>When love has been waiting quietly, how will you answer it?</i></p>`,doors:[{label:'🤫 Quiet Door<br>Sit close',to:'endingQuiet'},{label:'💛 Thank-You Door<br>Name what you noticed',to:'endingThanks'},{label:'🥞 Helping Door<br>Do something kind',to:'endingHelp'},{label:'🌷 Soft Words Door<br>Try again gently',to:'endingSoft'}]},
endingQuiet:{tag:'Ending',title:'The Quiet Door',mode:'bedMode',text:`<p>Pip did not know what to say. Clover did not know either.</p><p>So they padded across the rug and sat beside Papa Bear.</p><p>“Are you warm enough, little cubs?” he asked.</p><p>Pip nodded. Clover leaned against his arm. Pip leaned against the other.</p><p>The cabin was still little. But now it felt full.</p><p><b>Sometimes love does not need a big speech. Sometimes sitting close is the first thank-you.</b></p>`,message:true,nav:[{label:'Choose another door now',to:'finalDoors'},{label:'Return tomorrow to open another lantern door',to:'doors'}]},
endingThanks:{tag:'Ending',title:'The Thank-You Door',text:`<p>Pip looked at the soup pot. “You remembered the carrots.”</p><p>Clover pointed to the boots. “And you dried our boots.”</p><p>“You made the stars,” Pip said.</p><p>“And you kept our cups safe,” Clover whispered.</p><p>Papa Bear’s big paws rested on the table. For a moment, he did not speak.</p><p>Then he said softly, “I tried.”</p><p>The cubs ran into his arms.</p><p><b>A thank-you becomes powerful when it names the love it noticed.</b></p>`,message:true,nav:[{label:'Choose another door now',to:'finalDoors'},{label:'Return tomorrow to open another lantern door',to:'doors'}]},
endingHelp:{tag:'Ending',title:'The Helping Door',text:`<p>The next morning, Papa Bear woke to a strange sound.</p><p>Clink. Tap. Whisper.</p><p>Clover was folding napkins. Pip was placing cups on the table. The honey jar was upside down, and one spoon was stuck to the floor.</p><p>“What is happening here?” Papa Bear asked.</p><p>“We are making breakfast,” Pip said proudly.</p><p>“Not perfect breakfast,” Clover added.</p><p>Pip held up a pancake shaped like a boot. “Special breakfast.”</p><p>Papa Bear laughed the kind of laugh that warmed the windows.</p><p><b>Love grows when everyone gets to give something.</b></p>`,message:true,nav:[{label:'Choose another door now',to:'finalDoors'},{label:'Return tomorrow to open another lantern door',to:'doors'}]},
endingSoft:{tag:'Ending',title:'The Soft Words Door',mode:'bedMode',text:`<p>Pip looked down at her paws. “Papa Bear?”</p><p>“Yes, little cub?”</p><p>“I said your cabin was too small.”</p><p>Papa Bear smiled gently. “It is small.”</p><p>Pip shook her head. “But I said it with little teeth.”</p><p>“Big feelings sometimes come out with little teeth,” Papa Bear said.</p><p>“I can try softer words,” Pip whispered.</p><p>Papa Bear opened his arms. “That is a very brave try.”</p><p>The lanterns in the window glowed brighter than they had all winter.</p><p><b>A soft word can turn a little room warm again.</b></p>`,message:true,nav:[{label:'Choose another door now',to:'finalDoors'},{label:'Return tomorrow to open another lantern door',to:'doors'}]}
};
updateTracker(); render('start');
</script>
